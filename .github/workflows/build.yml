name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip git zip unzip \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev \
            autoconf automake libtool \
            zlib1g-dev cmake

      - name: Upgrade pip
        run: |
          python3 -m pip install --upgrade pip

      - name: Install buildozer
        run: |
          pip install cython buildozer

      - name: Init buildozer
        run: |
          buildozer init

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
